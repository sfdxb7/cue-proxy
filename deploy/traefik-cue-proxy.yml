http:
  routers:
    cue-proxy:
      rule: "Host(`proxy.alfalasi.io`)"
      entrypoints:
        - websecure
      tls:
        certResolver: letsencrypt
      service: cue-proxy
    cue-proxy-http:
      rule: "Host(`proxy.alfalasi.io`)"
      entrypoints:
        - web
      middlewares:
        - redirect-to-https
      service: cue-proxy
  services:
    cue-proxy:
      loadBalancer:
        servers:
          - url: "http://cue-proxy:3456"
  middlewares:
    redirect-to-https:
      redirectScheme:
        scheme: https
        permanent: true
